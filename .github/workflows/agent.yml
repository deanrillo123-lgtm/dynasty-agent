name: Dynasty Agent

on:
  schedule:
    # DAILY
    # 6:00 AM Chicago
    # CST = 12:00 UTC, CDT = 11:00 UTC
    - cron: "0 11 * * *"
    - cron: "0 12 * * *"

    # WEEKLY
    # Monday 7:00 AM Chicago
    # CST = 13:00 UTC, CDT = 12:00 UTC
    - cron: "0 12 * * 1"
    - cron: "0 13 * * 1"

    # SPRING TRAINING
    # 8:00 AM Chicago
    # CST = 14:00 UTC, CDT = 13:00 UTC
    - cron: "0 13 * * *"
    - cron: "0 14 * * *"

  workflow_dispatch:
    inputs:
      run_mode:
        description: "Select run mode"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - weekly
          - spring_daily_all
          - smtp_test
          - news_test
          - twitter_test
          - daily_realnews_test
          - daily_twitter_test
          - weekly_test
          - weekly_twitter_test

concurrency:
  group: dynasty-agent-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Decide scheduled RUN_MODE
        if: github.event_name == 'schedule'
        run: |
          SCHEDULE='${{ github.event.schedule }}'

          case "$SCHEDULE" in
            "0 11 * * *"|"0 12 * * *")
              MODE="daily"
              ;;
            "0 12 * * 1"|"0 13 * * 1")
              MODE="weekly"
              ;;
            "0 13 * * *"|"0 14 * * *")
              MODE="spring_daily_all"
              ;;
            *)
              MODE="noop"
              ;;
          esac

          echo "Selected mode: $MODE from schedule: $SCHEDULE"
          echo "$MODE" > run_mode.txt

      - name: Run (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_*

