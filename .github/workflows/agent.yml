name: Dynasty Agent

on:
  schedule:
    # Daily around 6am Chicago (DST-safe; Python gates to exactly 6am CT)
    - cron: "0 11 * * *"
    - cron: "0 12 * * *"

    # Weekly around 7am Chicago on Monday (DST-safe; Python gates to Mon 7am CT)
    - cron: "0 12 * * 1"
    - cron: "0 13 * * 1"

  workflow_dispatch:
    inputs:
      run_mode:
        description: "daily | weekly | smtp_test | news_test | daily_realnews_test | weekly_test"
        required: true
        default: "smtp_test"

concurrency:
  group: dynasty-agent-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          ROSTER_PATH: roster.csv
          RUN_MODE: ${{ inputs.run_mode }}
          IS_SCHEDULED: "0"
        run: python -u agent.py

      - name: Run daily (scheduled)
        if: github.event_name == 'schedule'
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          ROSTER_PATH: roster.csv
          RUN_MODE: daily
          IS_SCHEDULED: "1"
        run: python -u agent.py

      - name: Run weekly (scheduled)
        if: github.event_name == 'schedule'
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          ROSTER_PATH: roster.csv
          RUN_MODE: weekly
          IS_SCHEDULED: "1"
        run: python -u agent.py

      - name: Commit state/logs (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p state
          touch state/state.json state/weekly_official.jsonl state/weekly_reports.jsonl
          git add state/state.json state/weekly_official.jsonl state/weekly_reports.jsonl || true
          git diff --cached --quiet && echo "No state changes to commit" && exit 0
          git commit -m "Update agent state"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
