name: Dynasty Agent

on:
  schedule:
    # DAILY
    # 6:00 AM Chicago
    # CST = 12:00 UTC, CDT = 11:00 UTC
    - cron: "0 11 * * *"
    - cron: "0 12 * * *"

    # WEEKLY
    # Monday 7:00 AM Chicago
    # CST = 13:00 UTC, CDT = 12:00 UTC
    - cron: "0 12 * * 1"
    - cron: "0 13 * * 1"

    

  workflow_dispatch:
    inputs:
      run_mode:
        description: "Select run mode"
        required: true
        default: "daily"
        type: choice
        options:
          - daily
          - weekly
          - spring_daily_all
          - smtp_test
          - news_test
          - twitter_test
          - daily_realnews_test
          - daily_twitter_test
          - weekly_test
          - weekly_twitter_test
      test_email:
        description: "Override recipient email (leave blank for default)"
        required: false
        type: string

concurrency:
  group: dynasty-agent-main
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Decide scheduled RUN_MODE
        if: github.event_name == 'schedule'
        run: |
          SCHEDULE='${{ github.event.schedule }}'

          case "$SCHEDULE" in
            "0 11 * * *"|"0 12 * * *")
              MODE="daily"
              ;;
            "0 12 * * 1"|"0 13 * * 1")
              MODE="weekly"
              ;;
            "0 13 * * *"|"0 14 * * *")
              MODE="spring_daily_all"
              ;;
            *)
              MODE="noop"
              ;;
          esac

          echo "Selected mode: $MODE from schedule: $SCHEDULE"
          echo "$MODE" > run_mode.txt

      - name: Run (manual)
        if: github.event_name == 'workflow_dispatch'
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ inputs.test_email || secrets.RECIPIENT_EMAIL }}

          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          ROSTER_GID: ${{ secrets.ROSTER_GID }}
          AVAILABLE_GID: ${{ secrets.AVAILABLE_GID }}
          DD_RANK_GID: ${{ secrets.DD_RANK_GID }}
          BP_RANK_GID: ${{ secrets.BP_RANK_GID }}
          TOP500_GID: ${{ secrets.TOP500_GID }}

          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}

          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_MODE: "accurate"

          RUN_MODE: ${{ inputs.run_mode }}
          IS_SCHEDULED: "0"
        run: |
          echo "Token length: ${#TWITTER_BEARER_TOKEN}"
          python -u agent.py

      - name: Run scheduled
        if: github.event_name == 'schedule'
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}

          GSHEET_ID: ${{ secrets.GSHEET_ID }}
          ROSTER_GID: ${{ secrets.ROSTER_GID }}
          AVAILABLE_GID: ${{ secrets.AVAILABLE_GID }}
          DD_RANK_GID: ${{ secrets.DD_RANK_GID }}
          BP_RANK_GID: ${{ secrets.BP_RANK_GID }}
          TOP500_GID: ${{ secrets.TOP500_GID }}

          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}

          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          TWITTER_MODE: "accurate"

          IS_SCHEDULED: "1"
        run: |
          MODE=$(cat run_mode.txt 2>/dev/null || echo "noop")
          if [ "$MODE" = "noop" ]; then
            echo "No scheduled work."
            exit 0
          fi

          echo "Running RUN_MODE=$MODE"
          export RUN_MODE="$MODE"
          timeout 45m python -u agent.py

      - name: Commit state/logs (if changed)
        if: github.event_name == 'schedule'
        run: |
          MODE=$(cat run_mode.txt 2>/dev/null || echo "noop")
          if [ "$MODE" = "noop" ]; then
            echo "Skipping commit on noop."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          mkdir -p state
          touch state/state.json state/weekly_official.jsonl state/weekly_reports.jsonl

          git add state/state.json state/weekly_official.jsonl state/weekly_reports.jsonl || true
          git diff --cached --quiet && echo "No state changes to commit" && exit 0

          git commit -m "Update agent state" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
